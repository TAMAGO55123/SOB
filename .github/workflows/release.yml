name: Auto Release ZIP

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create ZIP (exclude .git)
        run: |
          zip -r sob.zip . -x "*.git*" -x ".github/*"

      - name: Generate start.sh
        run: |
          cat << 'EOF' > start.sh
          #!/bin/bash
          echo "Downloading latest SOB..."
          curl -L -o sob.zip https://github.com/${{ github.repository }}/releases/latest/download/sob.zip

          echo "Extracting..."
          unzip -o sob.zip

          echo "Starting bot..."
          python3 main.py
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Auto Release
          files: |
            sob.zip
            start.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
